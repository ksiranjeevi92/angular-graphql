@if (posts.length > 0) {
  <p-table [value]="posts" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Views</th>
      </tr>
    </ng-template>
    <ng-template #body let-posts>
      <tr>
        <td>{{ posts.id }}</td>
        <td>{{ posts.title }}</td>
        <td>{{ posts.views }}</td>
      </tr>
    </ng-template>
  </p-table>
}

@if (loading) {
  <p-progress-spinner ariaLabel="loading" />
}
